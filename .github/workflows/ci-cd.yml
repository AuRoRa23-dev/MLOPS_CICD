name: CI/CD Pipeline for Nginx Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log start of workflow
        run: |
          echo "Starting CI/CD pipeline for the web app"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        run: |
          echo "Building Docker image from Dockerfile"
          docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Verify the Docker image
        run: |
          echo "Inspecting built image"
          docker image inspect $IMAGE_NAME:${{ github.sha }} > /dev/null
          echo "Image build verified successfully"

      - name: Run container for smoke test
        run: |
          echo "Starting a temporary container for testing"
          docker run -d --rm -p 8080:80 --name cicd-demo-test $IMAGE_NAME:${{ github.sha }}
          sleep 5
          echo "Checking HTTP response from the container"
          curl -I http://127.0.0.1:8080
          docker rm -f cicd-demo-test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          echo "Pushing image to Docker Hub"
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest
          echo "Image published successfully"

      - name: Log workflow completion
        run: echo "CI/CD pipeline finished successfully"
